<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZhihuRec Debug Console</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="field">
          <label for="apiBase">API Base</label>
          <input id="apiBase" value="http://127.0.0.1:8000" />
        </div>
        <div class="field small">
          <label for="userId">User ID</label>
          <input id="userId" value="7248" inputmode="numeric" />
        </div>
        <button id="refreshProfile">Refresh Profile</button>
        <button id="refreshFeed">Refresh Feed</button>
        <div class="field query">
          <label for="queryKey">Query Key</label>
          <input id="queryKey" placeholder="18234 3402 616 1019" />
        </div>
        <button id="runSearch">Run Search</button>
      </header>

      <section id="status" class="status">Idle</section>

      <div class="workspace">
        <section class="panel profile-panel">
          <h1>Profile</h1>
          <div id="profileSummary" class="profile-summary empty">No profile loaded.</div>
        </section>

        <section class="panel results-panel feed-panel">
          <h1>Feed</h1>
          <div id="feedResults" class="results empty">No feed loaded.</div>
        </section>

        <section class="panel results-panel search-panel">
          <h1>Search</h1>
          <div id="searchResults" class="results empty">No search loaded.</div>
        </section>

        <section class="panel debug-panel">
          <h1>Debug JSON</h1>
          <pre id="debugJson">{}</pre>
        </section>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
